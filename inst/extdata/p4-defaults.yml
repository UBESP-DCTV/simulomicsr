# Defaults P4 self-hosted vLLM su DGX UniPD HPC.
# Caricati da R (yaml::read_yaml) e Python (yaml.safe_load).

model_id: "mistralai/Mistral-Small-3.2-24B-Instruct-2506"
dtype: "bfloat16"

# Mistral-3.2 e' multimodale (Mistral3Config). vLLM richiede tokenizer/config/
# load mode "mistral" (Tekken / mistral_common, NON HF AutoTokenizer).
# Verificato col smoke job 19723 il 2026-05-07 con vLLM 0.10.0.
tokenizer_mode: "mistral"
config_format:  "mistral"
load_format:    "mistral"

gpu_memory_utilization: 0.90
tensor_parallel_size: 1
data_parallel_workers: 4

stages:
  stage1:
    schema_file: "sample_facts.stage1.v3.json"
    # max_tokens 2048 (era 1024 nell'alpha originale): l'investigation
    # 2026-05-07 sui 211 residual fails post-rep_pen ha mostrato che 205
    # (97%) erano *legittime* truncation di sample con 4-5 perturbazioni
    # multiple (es. "BMP4, VEGF, SCF, ACTIVIN A, FGF2, CHIR99012") che
    # producono JSON ~3200-3500 char (~1000 token) e vanno oltre 1024.
    # Bumpando a 2048 → 100% recovery di Mode B. Vedi sezione
    # "Investigation 211 residual fails" in CLAUDE.md e ADR-0008.
    max_tokens: 2048
    max_model_len: 4096       # prompt ~600-800 tok + output 2048 rientra
    # `temperature: 0.0` (greedy) + `repetition_penalty: 1.1` e' il default
    # validato da ablation 2026-05-07 sui 1343 unique-FAIL del run alpha
    # (vedi CLAUDE.md "Risultati P4 alpha stage1").
    # - SENZA rep_pen, greedy entra in loop whitespace/null padding al
    #   90+% dei field-boundary "string|null" → 0% recovery sui hard.
    # - CON rep_pen 1.1 a temp 0.0: 84.3% recovery, full determinismo.
    # - Aumentare la temp da 0.0 a 0.4 alza recovery solo da 84.3% a 86.1%
    #   (+1.8 pp) ma porta concordance da 100% a ~87% sui contenuti
    #   (drift su `perturbations[].kind` e `disease_state.status`).
    # - Bumpare rep_pen 1.1 → 1.2 cracca i Mode A residuali (decoder loop
    #   sul boundary `engineered_modifications[].variant ["object","null"]`)
    #   ma non e' default per rischio drift sui 130k normali. Usare come
    #   escape hatch su residuals dopo max_tokens bump.
    # → rep_pen 1.1 e' IL fix; temp marginale, non vale il drift.
    temperature: 0.0
    repetition_penalty: 1.1
    schema_version: "stage1.v3"
    model_prefix: "vllm-mistral-3.2"
  stage2:
    schema_file: "study_design.stage2.v2.json"
    max_tokens: 4096
    max_model_len: 16384      # input multi-sample puo' essere lungo
    # Stesso ragionamento di stage1 (vedi sopra).
    temperature: 0.0
    repetition_penalty: 1.1
    schema_version: "stage2.v2"
    model_prefix: "vllm-mistral-3.2"

slurm_defaults:
  partition: "dgx12cluster"
  account: "dctv_dgx"
  # nodelist: NON specificato di default — lo scheduler sceglie il nodo
  # disponibile della partition (poddgx01, poddgx02 o poddgx03). Specificare
  # un nodelist esplicito puo' bloccare il job se quel nodo e' DRAIN/DOWN.
  cpus_per_task: 32
  mem: "200G"
  gpus: 4
  time_alpha: "12:00:00"
  time_beta: "7-00:00:00"
