# Defaults P4 self-hosted vLLM su DGX UniPD HPC.
# Caricati da R (yaml::read_yaml) e Python (yaml.safe_load).

model_id: "mistralai/Mistral-Small-3.2-24B-Instruct-2506"
dtype: "bfloat16"

# Mistral-3.2 e' multimodale (Mistral3Config). vLLM richiede tokenizer/config/
# load mode "mistral" (Tekken / mistral_common, NON HF AutoTokenizer).
# Verificato col smoke job 19723 il 2026-05-07 con vLLM 0.10.0.
tokenizer_mode: "mistral"
config_format:  "mistral"
load_format:    "mistral"

gpu_memory_utilization: 0.90
tensor_parallel_size: 1
data_parallel_workers: 4

stages:
  stage1:
    schema_file: "sample_facts.stage1.v3.json"
    # max_tokens 2048 (era 1024 nell'alpha originale): l'investigation
    # 2026-05-07 sui 211 residual fails post-rep_pen ha mostrato che 205
    # (97%) erano *legittime* truncation di sample con 4-5 perturbazioni
    # multiple (es. "BMP4, VEGF, SCF, ACTIVIN A, FGF2, CHIR99012") che
    # producono JSON ~3200-3500 char (~1000 token) e vanno oltre 1024.
    # Bumpando a 2048 → 100% recovery di Mode B. Vedi sezione
    # "Investigation 211 residual fails" in CLAUDE.md e ADR-0008.
    max_tokens: 2048
    max_model_len: 4096       # prompt ~600-800 tok + output 2048 rientra
    # `temperature: 0.0` (greedy) + `repetition_penalty: 1.1` e' il default
    # validato da ablation 2026-05-07 sui 1343 unique-FAIL del run alpha
    # (vedi CLAUDE.md "Risultati P4 alpha stage1").
    # - SENZA rep_pen, greedy entra in loop whitespace/null padding al
    #   90+% dei field-boundary "string|null" → 0% recovery sui hard.
    # - CON rep_pen 1.1 a temp 0.0: 84.3% recovery, full determinismo.
    # - Aumentare la temp da 0.0 a 0.4 alza recovery solo da 84.3% a 86.1%
    #   (+1.8 pp) ma porta concordance da 100% a ~87% sui contenuti
    #   (drift su `perturbations[].kind` e `disease_state.status`).
    # - Bumpare rep_pen 1.1 → 1.2 cracca i Mode A residuali (decoder loop
    #   sul boundary `engineered_modifications[].variant ["object","null"]`)
    #   ma non e' default per rischio drift sui 130k normali. Usare come
    #   escape hatch su residuals dopo max_tokens bump.
    # → rep_pen 1.1 e' IL fix; temp marginale, non vale il drift.
    temperature: 0.0
    repetition_penalty: 1.1
    schema_version: "stage1.v3"
    model_prefix: "vllm-mistral-3.2"
  stage2:
    schema_file: "study_design.stage2.v2.json"
    # === max_tokens: 4096 (Task 22 RESOLVED 2026-05-08) ===
    # Storico:
    #  - P3 dev: 4096 (online API, nessun problema)
    #  - Task 22 v4 (2026-05-07): 2048 → meno di 1024 a 1024 cercando di limitare
    #    il tempo per slot KV cache durante l'investigation degli stalli vLLM.
    #  - 1024 produceva 40% truncation (validato sul T5g 2000 record cs25:
    #    1201/2000 = 60% schema valid, 787 truncated con raw_output median 3021
    #    char ≈ 860 token, p99 3472 ≈ 990 token, vicino al cap 1024).
    #  - 4096 (default attuale): T5h 500 record cs25 → 485/500 = 97% schema
    #    valid. I residual 3% sono record con output 3300-3800 token (record
    #    cs25 fortemente strutturati con molti comparison + factor_levels).
    #  - Per residual rescue, riprovare quei record con max_tokens=8192 (pattern
    #    seguito da stage1 alpha 2026-05-07: 211 residual → max_tokens 1024→2048
    #    recovered 100%).
    max_tokens: 4096
    # max_model_len 32768: Mistral-Small-3.2 contesto nativo 32K. Stage2
    # input cs25 (chunk_size=25 in analysis/p4-stage2-build-input.R) ha
    # record max ~14K token (47KB JSON) + system prompt 2K + max_tokens 4K
    # = ~20K, ben sotto 32K cap.
    max_model_len: 32768
    # disable_guided_decoding: TRUE — xgrammar (unico backend installato in
    # vllm/vllm-openai:v0.10.0) stalla sul kernel
    # apply_token_bitmask_inplace_kernel_indices per il volume di shape
    # variants stage2 (Task 22 jobs 19778+19800). La generazione free-JSON
    # di Mistral-3.2 con system-prompt strutturato (vedi llm-stage2.R con
    # hint anti-markdown 2026-05-08) produce JSON parsabile ~97% dei casi
    # (T5h 485/500). Fence-strip difensivo applicato in
    # inst/dgx/python/run_p4_vllm.py per gestire ```json wrappers
    # eventuali. Validazione schema strict avviene post-hoc R-side via
    # parse_stage2_response().
    disable_guided_decoding: true
    # microbatch: 5 — write incrementale predictions.worker_*.jsonl ogni 5
    # record (resume granularity, progress visibility).
    microbatch: 5
    # enforce_eager: TRUE — disabilita CUDA graph capture. NB: con cs25
    # input non causa rallentamento misurabile (verificato T5g 2000
    # record).
    enforce_eager: true
    # max_num_seqs: 4 — max sequenze concorrenti per worker. Con cs25 e
    # max_model_len=32K la max concurrency disponibile è 4.56x (vLLM
    # log "Maximum concurrency for 32,768 tokens per request: 4.56x").
    max_num_seqs: 4
    # === scheduler_reserve_full_isl NON SETTATO (bootstrap fail job 19879) ===
    # vLLM 0.10.0 (container vllm/vllm-openai:v0.10.0) NON accetta
    # `scheduler_reserve_full_isl` come kwarg Python di EngineArgs/LLM():
    # il flag e' documentato nell'Issue #39734 come CLI option
    # (`--no-scheduler-reserve-full-isl` per vllm serve), ma non e' esposto
    # nell'API Python di questa versione. Tentativo di passarlo via
    # llm_kwargs causa TypeError in tutti i worker (job 19879 crashato
    # in 26s). Path C (chunk_size=25 in analysis/p4-stage2-build-input.R)
    # resta il primary defense ed e' sufficiente da solo per evitare la
    # zona-bug Issue #39734 (validato T5g 4/4 worker complete 500/500).
    # La propagazione in R/dgx-bundle.R e run_p4_vllm.py resta nel codice
    # (guarded da "if in gen and not None") per supportare future versioni
    # vLLM che dovessero esporre l'API; semplicemente non si setta nel yaml.
    # Stesso ragionamento di stage1 (vedi sopra).
    temperature: 0.0
    repetition_penalty: 1.1
    schema_version: "stage2.v2"
    model_prefix: "vllm-mistral-3.2"

slurm_defaults:
  partition: "dgx12cluster"
  account: "dctv_dgx"
  # nodelist: NON specificato di default — lo scheduler sceglie il nodo
  # disponibile della partition (poddgx01, poddgx02 o poddgx03). Specificare
  # un nodelist esplicito puo' bloccare il job se quel nodo e' DRAIN/DOWN.
  cpus_per_task: 32
  mem: "200G"
  gpus: 4
  time_alpha: "12:00:00"
  time_beta: "7-00:00:00"
